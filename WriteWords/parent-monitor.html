<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语默写 · 学习进度</title>
    <style>
        :root {
            --text: #4a3568; --muted: #6b5b8a; --panel: #fffef9; --border: #e8d4f8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Nunito", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh; color: var(--text);
            background: linear-gradient(160deg, #b8e6ff 0%, #e8d4ff 42%, #ffe8d4 100%);
            background-attachment: fixed;
        }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }
        header { text-align: center; margin-bottom: 18px; }
        header h1 { margin: 0 0 4px; font-size: clamp(1.4rem, 4vw, 1.85rem); color: #6b4a9a; }
        .toolbar {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center; align-items: center; margin-bottom: 16px;
        }
        .btn {
            font-family: inherit; font-weight: 800; font-size: 0.95rem;
            padding: 10px 20px; border: none; border-radius: 12px; cursor: pointer;
            background: linear-gradient(135deg, #64b5f6, #12a0e3); color: #fff;
        }
        .btn-ghost { background: #fff; color: #12a0e3; border: 2px solid #b5e2fa; }
        .meta { font-size: 0.88rem; color: var(--muted); font-weight: 700; }
        .week-select-group {
            display: flex; gap: 14px; align-items: center;
            justify-content: center; margin-bottom: 16px; flex-wrap: wrap;
        }
        .week-select-label { font-weight: 800; color: #2d6a9f; }
        .week-select {
            font-family: inherit; font-weight: 800; border-radius: 8px;
            border: 2px solid #b5e2fa; background: #f0f8ff; color: #2d6a9f; padding: 4px 12px;
        }
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .summary-card {
            background: var(--panel); border: 3px solid var(--border);
            border-radius: 18px; padding: 16px; text-align: center;
            box-shadow: 0 8px 22px rgba(100, 160, 220, 0.1);
        }
        .summary-card h2 { margin: 0 0 6px; font-size: 1.05rem; }
        .big-num { font-size: 1.8rem; font-weight: 900; line-height: 1.2; }
        .summary-sub { font-size: 0.85rem; color: var(--muted); font-weight: 700; margin-top: 4px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
        .student-panel {
            background: #fff; border: 3px solid #f0e8ff; border-radius: 18px; overflow: hidden;
            box-shadow: 0 8px 22px rgba(100, 160, 220, 0.08);
        }
        .panel-head {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px; font-weight: 800;
        }
        .badge {
            font-size: 0.78rem; font-weight: 800; padding: 4px 10px;
            border-radius: 999px; background: rgba(255,255,255,.7);
        }
        .panel-body { padding: 12px 14px 16px; }
        .err-box { color: #b91c1c; font-weight: 700; font-size: 0.9rem; line-height: 1.5; }
        .day-list { display: flex; flex-direction: column; gap: 8px; }
        .day-row { background: #faf8ff; border: 2px solid #f0e8ff; border-radius: 12px; padding: 10px 12px; }
        .day-row.today { border-color: #ffc857; }
        .day-row.all-done { border-color: #a8e8d0; background: #f8fffc; }
        .day-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .day-date { font-weight: 800; font-size: 0.92rem; }
        .tag-today {
            display: inline-block; margin-left: 6px; font-size: 0.7rem;
            background: #fff3cd; color: #b45309; padding: 2px 7px; border-radius: 999px;
        }
        .status-pill { font-size: 0.72rem; font-weight: 800; padding: 3px 8px; border-radius: 999px; }
        .status-pill.done { background: #d1fae5; color: #047857; }
        .status-pill.partial { background: #ffedd5; color: #c2410c; }
        .status-pill.none { background: #f3f4f6; color: #6b7280; }
        .progress-track { height: 8px; background: #f0e8ff; border-radius: 999px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 999px; transition: width .3s; }
        .day-meta { margin-top: 5px; font-size: 0.78rem; color: var(--muted); font-weight: 700; }
        .loading-all { text-align: center; padding: 40px 20px; font-weight: 800; color: #6b4a9a; }
        .foot-note { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted); font-weight: 600; }
        .foot-note a { color: #12a0e3; font-weight: 800; text-decoration: none; }
    </style>
</head>
<body>
    <div class="wrap">
        <header><h1>📊 英语默写 · 学习进度</h1></header>
        <div class="toolbar">
            <button type="button" class="btn" id="refreshBtn">🔄 刷新</button>
            <a href="index.html" class="btn btn-ghost" style="text-decoration:none;display:inline-block;">返回入口</a>
            <span class="meta" id="lastUpdate">正在加载…</span>
        </div>
        <div id="loadingAll" class="loading-all">正在读取各学生词库…</div>
        <div class="week-select-group" id="weekSelectGroup" style="display:none;"></div>
        <div id="mainContent" style="display:none;">
            <div class="summary" id="summaryRow"></div>
            <div class="grid" id="studentGrid"></div>
        </div>
        <div class="foot-note" id="footNote" style="display:none;">
            每 60 秒自动刷新 · <a href="index.html">返回入口</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="../gitee-data.js?v=20260723b"></script>
    <script src="students.js"></script>
    <script>
    var GITEE_DATA_DIR = 'WriteWords';
    (function () {
    'use strict';

    var STUDENTS = (window.StudentRoster && StudentRoster.list()) || [];
    var refreshTimer = null;
    var lastFingerprint = '';
    var selectedWeekMonday = null;
    var studentCache = {}; // key -> { ok, wb, fileName, error }

    function formatYYYYMMDD(d) {
        return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
    }
    function getTodayStr() { return formatYYYYMMDD(new Date()); }
    function isDateSheet(name) { return /^\d{4}-\d{2}-\d{2}$/.test(name); }
    function getMondayOf(dateStr) {
        var d = new Date(dateStr + 'T00:00:00');
        var dow = d.getDay();
        var off = dow === 0 ? -6 : 1 - dow;
        return formatYYYYMMDD(new Date(d.getFullYear(), d.getMonth(), d.getDate() + off));
    }
    function getWeekDateNames() {
        var d = new Date(), dow = d.getDay();
        var off = dow === 0 ? -6 : 1 - dow;
        var mon = new Date(d.getFullYear(), d.getMonth(), d.getDate() + off);
        var names = [];
        for (var i = 0; i < 5; i++) {
            names.push(formatYYYYMMDD(new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + i)));
        }
        return names;
    }
    function escHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function formatDuration(sec) {
        sec = parseInt(sec) || 0;
        if (sec < 60) return sec + ' 秒';
        var m = Math.floor(sec / 60), s = sec % 60;
        if (m < 60) return m + ' 分' + (s > 0 ? ' ' + s + ' 秒' : '');
        var h = Math.floor(m / 60); m = m % 60;
        return h + ' 小时' + (m > 0 ? ' ' + m + ' 分' : '');
    }
    function colIndex(header, names) {
        if (!header) return -1;
        for (var n = 0; n < names.length; n++) {
            for (var i = 0; i < header.length; i++) {
                if (String(header[i] || '').trim() === names[n]) return i;
            }
        }
        return -1;
    }

    function injectThemeCss() {
        var style = document.createElement('style');
        style.textContent = STUDENTS.map(function (st) {
            var k = st.key, c = st.color, bg = st.bg;
            return '.summary-card.' + k + ',.student-panel.' + k + '{border-color:' + c + '}' +
                '.summary-card.' + k + ' h2,.summary-card.' + k + ' .big-num{color:' + c + '}' +
                '.student-panel.' + k + ' .panel-head{background:' + bg + ';color:' + c + '}' +
                '.student-panel.' + k + ' .progress-fill{background:' + c + '}';
        }).join('\n');
        document.head.appendChild(style);
    }

    function getSheetStats(wb, sheetName) {
        if (!wb || !wb.Sheets[sheetName]) return { total: 0, done: 0, pct: 0, exists: false };
        var list = XLSX.utils.sheet_to_json(wb.Sheets[sheetName]);
        var total = 0, done = 0;
        list.forEach(function (row) {
            var eng = row['英文'] || row['English'] || row['english'] || '';
            var chi = row['中文'] || row['Chinese'] || row['chinese'] || '';
            if (!eng || !chi) return;
            total++;
            var p = row['通过'] || row['passed'] || '';
            if (String(p).trim() === '是') done++;
        });
        return { total: total, done: done, pct: total > 0 ? Math.round(done / total * 100) : 0, exists: true };
    }

    function getDailyStats(wb) {
        if (!wb || !wb.SheetNames.includes('每日统计')) return {};
        var data = XLSX.utils.sheet_to_json(wb.Sheets['每日统计'], { header: 1 });
        if (data.length < 2) return {};
        var h = data[0];
        var iDate = colIndex(h, ['日期']);
        var iTime = colIndex(h, ['当日耗时']);
        if (iDate < 0) return {};
        var map = {};
        for (var i = 1; i < data.length; i++) {
            var row = data[i];
            if (!row || !row[iDate]) continue;
            map[String(row[iDate]).trim()] = { timeSec: iTime >= 0 ? (parseInt(row[iTime]) || 0) : 0 };
        }
        return map;
    }

    function collectDateSheets(wb) {
        var names = new Set(getWeekDateNames());
        if (wb) wb.SheetNames.forEach(function (n) { if (isDateSheet(n)) names.add(n); });
        return Array.from(names).sort();
    }

    function splitWeeks(dateNames) {
        var weeks = {};
        dateNames.forEach(function (n) {
            var mon = getMondayOf(n);
            if (!weeks[mon]) weeks[mon] = [];
            weeks[mon].push(n);
        });
        return Object.keys(weeks).sort().reverse().map(function (mon) {
            return { monday: mon, dates: weeks[mon].sort() };
        });
    }

    function buildUnifiedWeeks() {
        var all = new Set(getWeekDateNames());
        Object.keys(studentCache).forEach(function (k) {
            var item = studentCache[k];
            if (!item || !item.ok || !item.wb) return;
            collectDateSheets(item.wb).forEach(function (d) { all.add(d); });
        });
        return splitWeeks(Array.from(all).sort());
    }

    function weekDatesForSelected(weeks) {
        for (var i = 0; i < weeks.length; i++) {
            if (weeks[i].monday === selectedWeekMonday) return weeks[i].dates;
        }
        if (weeks.length) {
            selectedWeekMonday = weeks[0].monday;
            return weeks[0].dates;
        }
        return [];
    }

    function renderWeekSelect(weeks) {
        var group = document.getElementById('weekSelectGroup');
        if (weeks.length <= 1) {
            group.style.display = weeks.length ? 'none' : 'none';
            if (weeks.length === 1) selectedWeekMonday = weeks[0].monday;
            return;
        }
        var todayMon = getMondayOf(getTodayStr());
        if (!selectedWeekMonday) selectedWeekMonday = todayMon;
        var html = '<span class="week-select-label">📅 选择周：</span><select class="week-select" id="weekSelect">';
        weeks.forEach(function (wk) {
            var fri = new Date(wk.monday + 'T00:00:00');
            fri.setDate(fri.getDate() + 4);
            var label = wk.monday.slice(5) + ' ~ ' + formatYYYYMMDD(fri).slice(5);
            if (wk.monday === todayMon) label += '（本周）';
            html += '<option value="' + wk.monday + '"' + (wk.monday === selectedWeekMonday ? ' selected' : '') + '>' + label + '</option>';
        });
        html += '</select>';
        group.innerHTML = html;
        group.style.display = '';
        document.getElementById('weekSelect').onchange = function () {
            selectedWeekMonday = this.value;
            renderAll();
        };
    }

    function studentWeekHtml(st, weekDates) {
        var item = studentCache[st.key];
        if (!item || !item.ok) {
            return '<div class="err-box">' + escHtml((item && item.error) || '未加载') +
                '<br>请确认 Gitee ' + GITEE_DATA_DIR + ' 下有 ' + escHtml((st.files || []).join(' / ')) + '</div>';
        }
        var wb = item.wb;
        var todayStr = getTodayStr();
        var dailyStats = getDailyStats(wb);
        var html = '<div class="day-list">';
        weekDates.forEach(function (name) {
            var stt = getSheetStats(wb, name);
            var ds = dailyStats[name];
            var isToday = name === todayStr;
            var isDone = stt.exists && stt.total > 0 && stt.done >= stt.total;
            var statusCls = 'none', statusText = '无题目';
            if (!stt.exists || stt.total === 0) { statusCls = 'none'; statusText = '无题目'; }
            else if (stt.done === 0) { statusCls = 'none'; statusText = '未开始'; }
            else if (stt.done >= stt.total) { statusCls = 'done'; statusText = '已完成'; }
            else { statusCls = 'partial'; statusText = '进行中 ' + stt.pct + '%'; }
            html += '<div class="day-row' + (isToday ? ' today' : '') + (isDone ? ' all-done' : '') + '">';
            html += '<div class="day-top"><span class="day-date">' + escHtml(name) +
                (isToday ? '<span class="tag-today">今天</span>' : '') + '</span>';
            html += '<span class="status-pill ' + statusCls + '">' + statusText + '</span></div>';
            html += '<div class="progress-track"><div class="progress-fill" style="width:' + stt.pct + '%"></div></div>';
            var meta = [];
            if (stt.exists && stt.total > 0) meta.push('📖 ' + stt.done + '/' + stt.total + ' 词');
            if (ds && ds.timeSec > 0) meta.push('⏱ ' + formatDuration(ds.timeSec));
            if (meta.length) html += '<div class="day-meta">' + meta.join(' · ') + '</div>';
            html += '</div>';
        });
        return html + '</div>';
    }

    function studentSummary(st, weekDates) {
        var item = studentCache[st.key];
        if (!item || !item.ok) {
            return '<div class="summary-card ' + st.key + '"><h2>' + (st.icon || '') + ' ' + st.label +
                '</h2><div class="big-num">—</div><div class="summary-sub">词库未加载</div></div>';
        }
        var totalWords = 0, totalDone = 0, daysCompleted = 0;
        weekDates.forEach(function (name) {
            var s = getSheetStats(item.wb, name);
            totalWords += s.total;
            totalDone += s.done;
            if (s.total > 0 && s.done >= s.total) daysCompleted++;
        });
        var pct = totalWords > 0 ? Math.round(totalDone / totalWords * 100) : 0;
        return '<div class="summary-card ' + st.key + '"><h2>' + (st.icon || '') + ' ' + st.label +
            '</h2><div class="big-num">' + pct + '%</div>' +
            '<div class="summary-sub">本周 ' + totalDone + '/' + totalWords + ' 词 · 完成 ' +
            daysCompleted + '/' + weekDates.length + ' 天</div></div>';
    }

    function renderAll() {
        var weeks = buildUnifiedWeeks();
        renderWeekSelect(weeks);
        var weekDates = weekDatesForSelected(weeks);
        if (!weekDates.length) weekDates = getWeekDateNames();

        document.getElementById('summaryRow').innerHTML = STUDENTS.map(function (st) {
            return studentSummary(st, weekDates);
        }).join('');

        document.getElementById('studentGrid').innerHTML = STUDENTS.map(function (st) {
            var item = studentCache[st.key];
            var badge = '—';
            if (item && item.ok) {
                var tw = 0, td = 0;
                weekDates.forEach(function (n) {
                    var s = getSheetStats(item.wb, n);
                    tw += s.total; td += s.done;
                });
                badge = tw ? (td + '/' + tw) : '无词';
            } else {
                badge = '未加载';
            }
            return '<section class="student-panel ' + st.key + '">' +
                '<div class="panel-head"><span>' + (st.icon || '') + ' ' + st.label +
                '</span><span class="badge">' + badge + '</span></div>' +
                '<div class="panel-body">' + studentWeekHtml(st, weekDates) + '</div></section>';
        }).join('');

        document.getElementById('loadingAll').style.display = 'none';
        document.getElementById('mainContent').style.display = '';
        document.getElementById('footNote').style.display = '';
        document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString();
    }

    async function fetchOneStudent(st) {
        var candidates = st.files && st.files.length ? st.files.slice() : [];
        for (var i = 0; i < candidates.length; i++) {
            try {
                var buf = await GiteeData.fetchFile(GiteeData.joinPath(GITEE_DATA_DIR, candidates[i]));
                if (buf.byteLength < 512) continue;
                return {
                    ok: true,
                    wb: XLSX.read(new Uint8Array(buf), { type: 'array' }),
                    fileName: candidates[i]
                };
            } catch (e) { /* next */ }
        }
        return { ok: false, error: '未找到 ' + candidates.join(' / ') };
    }

    async function loadAll(silent) {
        if (!silent) document.getElementById('loadingAll').style.display = '';
        if (!STUDENTS.length) {
            document.getElementById('loadingAll').innerHTML = '⚠️ 请先在 students.js 配置学生';
            return;
        }
        var next = {};
        for (var i = 0; i < STUDENTS.length; i++) {
            next[STUDENTS[i].key] = await fetchOneStudent(STUDENTS[i]);
        }
        var fp = Object.keys(next).map(function (k) {
            var it = next[k];
            if (!it.ok) return k + ':err';
            return k + ':' + (it.wb.SheetNames || []).join(',');
        }).join('|');
        if (silent && fp === lastFingerprint) return;
        lastFingerprint = fp;
        studentCache = next;
        renderAll();
    }

    injectThemeCss();
    document.getElementById('refreshBtn').onclick = function () { loadAll(false); };
    loadAll(false).then(function () {
        refreshTimer = setInterval(function () { loadAll(true); }, 60000);
    });
    })();
    </script>
</body>
</html>
