<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学加减法练习 · 入口</title>
    <style>
        body {
            font-family: "Nunito", "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #e0f7fa, #b2ebf2 50%, #fff8e1 100%);
        }
        .box {
            background: rgba(255,254,249,.94);
            border: 4px solid #b2ebf2;
            border-radius: 32px;
            padding: 48px 36px 40px;
            min-width: 340px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,131,143,.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .logo { font-size: 2.5rem; margin-bottom: 4px; user-select: none; }
        h1 {
            margin: 0 0 6px; color: #00838f; font-size: 2rem;
            letter-spacing: 1px; font-weight: 800;
        }
        .desc {
            color: #607d8b; margin: 0; font-size: 1.05rem;
            line-height: 1.7; font-weight: 600;
        }
        .entry-list {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; gap: 14px; margin-top: 8px;
        }
        .entry-list a, .parent {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 10px; min-width: 220px; padding: 16px 28px;
            border-radius: 18px; font-weight: 800; text-decoration: none;
            color: #fff; font-size: 1.1rem; box-shadow: 0 6px 20px rgba(0,0,0,.08);
            transition: transform .14s, box-shadow .15s; border: none; font-family: inherit;
        }
        .entry-list a:hover, .parent:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 32px rgba(0,0,0,.12);
        }
        /* 学生按钮颜色由 students.js 的 color 动态设置，这里不写死 */
        .entry-list a .icon { font-size: 1.35em; }
        .parent {
            background: linear-gradient(135deg, #a78bfa, #7c5cbf);
            font-size: 1.02rem; padding: 13px 24px;
        }
        .parent .icon { font-size: 1.2em; }
        .footnote {
            color: #90a4ae; font-size: .9rem; margin-top: 10px;
            font-weight: 600; line-height: 1.5;
        }
        @media (max-width: 460px) {
            .box { padding: 28px 7vw 30px; border-radius: 20px; min-width: 0; }
            h1 { font-size: 1.4rem; }
            .entry-list a, .parent { min-width: 180px; font-size: 1rem; padding: 13px 18px; }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo" aria-hidden="true">🧮✏️</div>
        <h1>数学加减法练习</h1>
        <div class="desc">
            竖式计算，练好加减法基本功！<br>
            每天坚持，数学越来越棒👇
        </div>
        <div class="entry-list" id="entryList"></div>
        <a class="parent" href="parent-monitor.html">
            <span class="icon" aria-hidden="true">📊</span>
            家长查看进度
        </a>
        <div class="footnote">
            📢 每天坚持练习，争取全部算对！<br>
            👨‍👩‍👧‍👦 家长可以随时查看学习进度
        </div>
    </div>
    <script src="students.js?v=20260723pink"></script>
    <script>
        (function () {
            var box = document.getElementById("entryList");
            var students = (window.StudentRoster && StudentRoster.list()) || [];
            if (!students.length) {
                box.innerHTML = '<p style="color:#c00;font-weight:700">请先在 students.js 配置学生</p>';
                return;
            }
            students.forEach(function (st) {
                var a = document.createElement("a");
                a.href = "shuxue_jiajian.html?grade=" + encodeURIComponent(st.key);
                var c = st.color || "#ff7eb3";
                a.style.cssText +=
                    ";background:" + c +
                    ";background-image:linear-gradient(135deg," + c + "," + c + ");";
                a.innerHTML = '<span class="icon" aria-hidden="true">' + (st.icon || "🎯") + "</span>" + st.label;
                box.appendChild(a);
            });
        })();
    </script>
</body>
</html>
