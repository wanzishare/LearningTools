<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>句子朗读录音 · 入口</title>
    <style>
        body {
            font-family: "Nunito", "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #e8d4ff, #c9b6ff 45%, #b8e6ff 100%);
        }
        .box {
            background: rgba(255,254,249,.94);
            border: 4px solid #d4c4f8;
            border-radius: 32px;
            padding: 48px 36px 40px;
            min-width: 340px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(100,70,180,.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .logo { font-size: 2.5rem; margin-bottom: 4px; user-select: none; }
        h1 {
            margin: 0 0 6px; color: #6b4a9a; font-size: 2rem;
            letter-spacing: 1px; font-weight: 800;
        }
        .desc {
            color: #8b7aa8; margin: 0; font-size: 1.05rem;
            line-height: 1.7; font-weight: 600;
        }
        .entry-list {
            width: 100%; display: flex; flex-direction: column;
            align-items: center; gap: 14px; margin-top: 8px;
        }
        .entry-list a {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 10px; min-width: 220px; padding: 16px 28px;
            border-radius: 18px; font-weight: 800; text-decoration: none;
            color: #fff; font-size: 1.1rem;
            /* 颜色由 students.js 的 color 动态设置 */
            box-shadow: 0 6px 20px rgba(124,92,191,.25);
            transition: transform .14s, box-shadow .15s;
            font-family: inherit;
        }
        .entry-list a:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 32px rgba(124,92,191,.35);
        }
        .entry-list a .icon { font-size: 1.35em; }
        .footnote {
            color: #9a8ab8; font-size: .9rem; margin-top: 10px;
            font-weight: 600; line-height: 1.5;
        }
        @media (max-width: 460px) {
            .box { padding: 28px 7vw 30px; border-radius: 20px; min-width: 0; }
            h1 { font-size: 1.4rem; }
            .entry-list a { min-width: 180px; font-size: 1rem; padding: 13px 18px; }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo" aria-hidden="true">🎤📖</div>
        <h1>句子朗读录音</h1>
        <div class="desc">
            按日期练习朗读并上传录音。<br>
            请选择学生开始👇
        </div>
        <div class="entry-list" id="entryList"></div>
        <div class="footnote">
            词库与录音保存在 Gitee LearningData/ReadAloud
        </div>
    </div>
    <script src="students.js?v=20260723pink"></script>
    <script>
        (function () {
            var box = document.getElementById("entryList");
            var students = (window.StudentRoster && StudentRoster.list()) || [];
            if (!students.length) {
                box.innerHTML = '<p style="color:#c00;font-weight:700">请先在 students.js 配置学生</p>';
                return;
            }
            students.forEach(function (st) {
                var a = document.createElement("a");
                a.href = "read_aloud.html?grade=" + encodeURIComponent(st.key);
                var c = st.color || "#ff7eb3";
                a.style.cssText +=
                    ";background:" + c +
                    ";background-image:linear-gradient(135deg," + c + "," + c + ");";
                a.innerHTML = '<span class="icon" aria-hidden="true">' + (st.icon || "🎤") + "</span>" + st.label;
                box.appendChild(a);
            });
        })();
    </script>
</body>
</html>
