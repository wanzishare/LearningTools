        startSheet(picked.sheet, picked.isToday);
        if (isSheetAllDone(picked.sheet)) {
            const n = getDailySlice(picked.sheet).length;
            toast(dayLabelForSheet(picked.sheet) + "每日 " + n + " 个单词已全部消除", false);
        }
        hideLoadArea();
        return { ok: true };
    }

    async function ingestWordsBuffer(buf, filename) {
        if (buf.byteLength < 512) {
            return { ok: false, reason: "corrupt" };
        }
        let parsed;
        try {
            parsed = parseWorkbook(buf, filename);
        } catch (err) {
            console.warn("[load] parse failed:", filename, err);
            return { ok: false, reason: "corrupt" };
        }
        return applyParsedWords(parsed, filename);
    }

    async function tryLoadLocalWords() {
        let fetchedAny = false;
        let parsedAny = false;
        for (const file of WORDS_CANDIDATES) {
            let buf;
            try {
                buf = await GiteeData.fetchFile(GiteeData.joinPath(GITEE_DATA_DIR, file));
            } catch (e) {
                console.warn("[load] Gitee fetch failed:", file, e);
                continue;
            }
            fetchedAny = true;
            const result = await ingestWordsBuffer(buf, file);
            if (result.ok) return true;
            if (result.reason === "corrupt") parsedAny = true;
            if (result.reason === "empty") parsedAny = true;
        }
        if (!fetchedAny) return { ok: false, reason: "missing" };
        if (!parsedAny) return { ok: false, reason: "corrupt" };
        return { ok: false, reason: "empty" };
    }

    async function loadWordsFromFile(file) {
        if (!file) return false;
        const loading = document.getElementById("loadingMsg");
        loading.style.display = "block";
        loading.textContent = "正在读取 " + file.name + "…";
        document.getElementById("loadError").style.display = "none";
        try {
            await waitForXlsx(10000);
            if (typeof XLSX === "undefined") {
                throw new Error("Excel 解析库加载失败");
            }
            const result = await ingestWordsBuffer(await file.arrayBuffer(), file.name);
            if (result.ok) {
                toast("词库已加载：" + file.name);
                showPickWordsBtn(false);
                return true;
            }
            if (result.reason === "corrupt") {
                throw new Error("文件已损坏或不是有效的 Excel");
            }
            throw new Error("文件里没有有效单词：需有「单词列表」Sheet，表头含「英文」「中文」且至少一行");
        } catch (err) {
            showLoadError((err && err.message) || String(err));
            toast("词库加载失败：" + ((err && err.message) || err), true);
            return false;
        } finally {
            if (!gameData || !Object.keys(gameData).length) {
                loading.style.display = "none";
            }
        }
    }

    async function fetchWordsDiag() {
        try {
            const path = GiteeData.joinPath(GITEE_DATA_DIR, gWordsFilename);
            const meta = await GiteeData.getFileMeta(path);
            if (!meta) {
                return { ok: true, root: "gitee:" + GiteeData.CONFIG.REPOSITORY, files: [{ name: gWordsFilename, exists: false }] };
            }
            return {
                ok: true,
                root: "gitee:" + GiteeData.CONFIG.REPOSITORY + "/" + GITEE_DATA_DIR,
                files: [{ name: meta.name || gWordsFilename, exists: true, size: meta.size, sha: meta.sha }]
            };
        } catch (e) {
            return null;
        }
    }

    async function waitForXlsx(ms) {
        const deadline = Date.now() + (ms || 10000);
        while (typeof XLSX === "undefined" && Date.now() < deadline) {
            await new Promise(r => setTimeout(r, 80));
        }
    }

    function showLoadError(msg) {
        const errEl = document.getElementById("loadError");
        errEl.textContent = msg;
        errEl.style.display = "block";
        document.getElementById("retryBtn").style.display = "inline-block";
        document.getElementById("loadArea").classList.remove("done");
    }

    function hideLoadArea() {
        document.getElementById("loadArea").classList.add("done");
        document.getElementById("loadError").style.display = "none";
        document.getElementById("retryBtn").style.display = "none";
        document.getElementById("loadingMsg").style.display = "none";
    }

    function collectDateSheetNames(dict) {
        const names = new Set(getWeekDateNames(new Date()));
        Object.keys(dict || {}).forEach(k => {
            if (isDateSheetName(k)) names.add(k);
        });
        if (gWorkbook) {
            gWorkbook.SheetNames.forEach(k => {
                if (isDateSheetName(k)) names.add(k);
            });
        }
        return [...names].sort();
    }

    function applyGameData(dict) {
        if (!wordListPairs.length) {
            toast("请先在「单词列表」Sheet 中填写英文与中文（至少一行）", true);
            return false;
        }
        const merged = {};
        collectDateSheetNames(dict).forEach(k => {
            merged[k] = (dict && dict[k]) ? dict[k].slice() : [];
        });
        gameData = merged;
        const sel = document.getElementById("dateSelector");
        sel.innerHTML = '<option value="">选择日期</option>';
        Object.keys(merged).forEach(n => {
            const st = getSheetPairStats(n);
            const opt = document.createElement("option");
            opt.value = n;
            opt.textContent = formatDateOptionLabel(n, st.left, st.total);
            sel.appendChild(opt);
        });
        document.getElementById("toolbar").style.display = "flex";
        document.getElementById("statsBar").style.display = "flex";
        updateResetBtn();
        return true;
    }

    async function tryAutoLoad() {
        const loading = document.getElementById("loadingMsg");
        document.getElementById("loadError").style.display = "none";
        document.getElementById("retryBtn").style.display = "none";
        showPickWordsBtn(false);
        document.getElementById("loadArea").classList.remove("done");
        loading.style.display = "block";
        if (wordsConfig.missingGrade) {
            showPickWordsBtn(false);
            throw new Error(
                "请从入口选择学生进入（index.html），或使用 ?grade=学生key。学生列表在 students.js 中配置。"
            );
        }
        loading.textContent = "正在从 Gitee 读取 " + gWordsFilename + "…";
        try {
            await waitForXlsx(10000);
            if (typeof XLSX === "undefined") {
                throw new Error("Excel 解析库加载失败，请检查网络是否可访问 CDN");
            }
            if (typeof GiteeData === "undefined") {
                throw new Error("Gitee 数据模块加载失败，请确认 ../gitee-data.js 可访问");
            }
            const loaded = await tryLoadLocalWords();
            if (loaded === true) return true;
            const diag = await fetchWordsDiag();
            let extra = "";
            if (diag && diag.files) {
                const parts = diag.files.map(f => f.exists ? f.name + "(" + f.size + "B)" : f.name + "(无)");
                extra = " Gitee 词库：" + parts.join("，") + "。";
            } else {
                extra = " 请检查 gitee-data.js 中的仓库/Token，以及 LearningData/" + GITEE_DATA_DIR + " 目录是否已上传。";
            }
            if (loaded && loaded.reason === "corrupt") {
                throw new Error("词库已损坏或格式不对（文件过小）。" + extra + " 可点「选择词库文件」手动加载。");
            }
            if (loaded && loaded.reason === "empty") {
                throw new Error(
                    "词库能打开但无有效题目：需有「单词列表」Sheet（英文/中文），并在「配置」中设置每日单词数。" + extra
                );
            }
            showPickWordsBtn(true);
            throw new Error("未找到 " + wordsFileHint() + "。请将词库上传到 Gitee LearningData/" + GITEE_DATA_DIR + "。" + extra);
        } catch (err) {
            const msg = (err && err.message) || String(err);
            showLoadError(msg);
            toast("词库加载失败：" + msg, true);
            console.error("[tryAutoLoad]", err);
            if (location.protocol === "file:" || /选择 words/.test(msg)) showPickWordsBtn(true);
            return false;
        } finally {
            if (!gameData || !Object.keys(gameData).length) {
                loading.style.display = "none";
            }
        }
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function settleTileEnter(el) {
        if (el) el.classList.remove("tile-enter");
    }

    function labelNeedsTwoLines(label) {
        const width = label.clientWidth;
        if (!width || !label.textContent) return false;
        const ref = getComputedStyle(label);
        const probe = document.createElement("div");
        probe.style.cssText =
            "position:fixed;left:-9999px;top:0;visibility:hidden;pointer-events:none;width:" + width + "px;" +
            "font-size:" + ref.fontSize + ";font-weight:" + ref.fontWeight + ";line-height:" + ref.lineHeight + ";" +
            "font-family:" + ref.fontFamily + ";word-break:break-word;";
        probe.textContent = label.textContent;
        document.body.appendChild(probe);
        const linePx = parseFloat(getComputedStyle(probe).lineHeight) || 20;
        const need = probe.offsetHeight > linePx * 1.15;
        probe.remove();
        return need;
    }

    function syncTileUniformHeight() {
        const tiles = document.querySelectorAll("#enList .tile, #zhList .tile");
        if (!tiles.length) return;
        let needTwo = false;
        tiles.forEach(t => {
            const label = t.querySelector(".tile-label");
            if (label && labelNeedsTwoLines(label)) needTwo = true;
        });
        tiles.forEach(t => t.classList.toggle("tile-lines-2", needTwo));
    }

    function createTile(card, delay) {
        const el = document.createElement("div");
        el.className = "tile tile-enter";
        el.dataset.type = card.type;
        el.dataset.pairIdx = card.pairIdx;
        const label = document.createElement("span");
        label.className = "tile-label";
        label.textContent = card.text;
        el.appendChild(label);
        el.style.animationDelay = delay + "s";
        el.addEventListener("animationend", (e) => {
            if (e.animationName === "tileIn") settleTileEnter(el);
        });
        el.addEventListener("click", onTileClick);
        return el;
    }

    function updateMatchedStat() {
        let done, total;
        if (currentSheet && wordListPairs.length) {
            const stats = getSheetPairStats(currentSheet);
            done = stats.done;
            total = stats.total;
        } else {
            total = curPairs ? curPairs.length : 0;
            done = matchedCount;
        }
        document.getElementById("matchedCount").textContent = done;
        document.getElementById("totalPairs").textContent = total;
    }

    function initErrorLimit() {
        errorLimit = Math.max(1, curPairs ? curPairs.length : 0);
        wrongCount = 0;
        updateErrorStat();
    }

    function updateErrorStat() {
        const wcEl = document.getElementById("wrongCount");
        const limEl = document.getElementById("errorLimit");
        const pill = document.getElementById("errorStatPill");
        if (wcEl) wcEl.textContent = wrongCount;
        if (limEl) limEl.textContent = errorLimit;
        if (!pill) return;
        pill.classList.remove("warn", "danger");
        if (wrongCount >= errorLimit) pill.classList.add("danger");
        else if (errorLimit > 0 && wrongCount >= Math.max(1, errorLimit - 2)) pill.classList.add("warn");
    }

    async function handleErrorLimitExceeded() {
        if (!currentSheet) return;
        lockBoard = true;
        clearSelection();
        if (timerInt) clearInterval(timerInt);
        stopDailyActivityAutoFlush();
        const sheet = currentSheet;
        const today = getTodaySheetName();
        const clearToday = isTodaySheet(sheet);
        toast(
            clearToday
                ? "错误次数已达上限（" + errorLimit + " 次）！今日题目将清空，重新开始"
                : "错误次数已达上限！「" + sheet + "」将清空消除记录并重来",
            true
        );
        try {
            recordSessionActivity(sheet);
            await queueSave(() => clearSheetEliminated(sheet));
            stopCelebration();
            const over = document.getElementById("gameOverMsg");
            over.style.display = "none";
            over.className = "";
            replayMode = false;
            wrongCount = 0;
            curPairs = getActivePairs(sheet);
            refreshDateOption(sheet);
            document.getElementById("dateSelector").value = sheet;
            startGame();
            toast(clearToday ? "今日已清空并重玩，请认真配对哦" : "已清空并重玩，请认真配对哦");
        } catch (err) {
            toast("清空失败：" + (err.message || err), true);
            lockBoard = false;
        }
    }

    function registerWrongMatch() {
        wrongCount++;
        updateErrorStat();
        if (wrongCount >= errorLimit) {
            setTimeout(() => handleErrorLimitExceeded(), 480);
            return true;
        }
        return false;
    }

    function splitEnZhPicks(first, second) {
        return first.type === "en"
            ? { en: first, zh: second }
            : { en: second, zh: first };
    }

    function clearSelection() {
        document.querySelectorAll("#gameBoard .tile.selected").forEach(el => {
            el.classList.remove("selected");
        });
        selectedTile = null;
        pairAwaitingConfirm = null;
    }

    /** 取消确认后仍高亮的一对：再点时只保留一列选中，避免同列多张同时高亮 */
    function normalizePairAwaitingOnClick(tile, pairIdx, type) {
        if (!pairAwaitingConfirm) return false;
        const { en, zh } = splitEnZhPicks(pairAwaitingConfirm.first, pairAwaitingConfirm.second);
        if (tile === en.el) {
            en.el.classList.remove("selected");
            pairAwaitingConfirm = null;
            selectedTile = zh.el.isConnected ? { el: zh.el, pairIdx: zh.pairIdx, type: "zh" } : null;
            return true;
        }
        if (tile === zh.el) {
            zh.el.classList.remove("selected");
            pairAwaitingConfirm = null;
            selectedTile = en.el.isConnected ? { el: en.el, pairIdx: en.pairIdx, type: "en" } : null;
            return true;
        }
        en.el.classList.remove("selected");
        zh.el.classList.remove("selected");
        pairAwaitingConfirm = null;
        selectedTile = null;
        return false;
    }

    function refreshDateOption(sheetName) {
        const sel = document.getElementById("dateSelector");
        const opt = Array.from(sel.options).find(o => o.value === sheetName);
        if (!opt || !gameData[sheetName]) return;
        const st = getSheetPairStats(sheetName);
        opt.textContent = formatDateOptionLabel(sheetName, st.left, st.total);
    }

    function startGame(fromDateSwitch) {
        if (fromDateSwitch) stopCelebration();
        const sheetStats = currentSheet ? getSheetPairStats(currentSheet) : { total: 0, done: 0, left: 0 };
        matchedCount = sheetStats.done;

        if (!replayMode && (!curPairs || !curPairs.length)) {
            hideLoadArea();
            replayMode = false;
            stopDailyActivityAutoFlush();
            if (currentSheet) flushDailyActivityDelta(currentSheet, { silent: true });
            moveCount = 0;
            timer = 0;
            resetActivityPersistBaseline();
            selectedTile = null;
            lockBoard = false;
            document.getElementById("moveCount").textContent = "0";
            document.getElementById("timer").textContent = "0";
            wrongCount = 0;
            errorLimit = 0;
            updateErrorStat();
            updateMatchedStat();
            if (timerInt) clearInterval(timerInt);
            const emptyMsg = getEmptyBoardMessage();
            document.getElementById("gameBoard").innerHTML =
                '<p class="match-hint">' + emptyMsg + "</p>";
            const over = document.getElementById("gameOverMsg");
            if (currentSheet && (isSheetAllDone(currentSheet) || isSheetFullyMastered())) {
                showAllDoneQuiet({ extraText: emptyMsg });
            } else {
                over.style.display = "none";
                over.className = "";
                stopCelebration();
                updateResetBtn();
            }
            return;
        }
        hideLoadArea();
        stopDailyActivityAutoFlush();
        if (currentSheet) flushDailyActivityDelta(currentSheet, { silent: true });
        moveCount = 0;
        timer = 0;
        resetActivityPersistBaseline();
        selectedTile = null;
        lockBoard = false;
        document.getElementById("moveCount").textContent = "0";
        document.getElementById("timer").textContent = "0";
        initErrorLimit();
        updateMatchedStat();
        const over = document.getElementById("gameOverMsg");
        over.style.display = "none";
        over.className = "";
        stopCelebration();

        const enCards = curPairs.map((pair, idx) => ({ type: "en", text: pair.en, pairIdx: idx }));
        const zhCards = curPairs.map((pair, idx) => ({ type: "zh", text: pair.zh, pairIdx: idx }));
        shuffle(enCards);
        shuffle(zhCards);

        const board = document.getElementById("gameBoard");
        const n = curPairs.length;
        board.innerHTML =
            '<div class="match-board">' +
            '<div class="match-col">' +
            '<div class="match-col-head"><p class="match-col-title">英文</p><span class="match-col-count" id="enColCount">' + n + '</span></div>' +
            '<div class="tile-scroll"><div class="tile-list" id="enList"></div></div></div>' +
            '<div class="match-col">' +
            '<div class="match-col-head"><p class="match-col-title">中文</p><span class="match-col-count" id="zhColCount">' + n + '</span></div>' +
            '<div class="tile-scroll"><div class="tile-list" id="zhList"></div></div></div>' +
            '</div>';
        const enList = document.getElementById("enList");
        const zhList = document.getElementById("zhList");
        enCards.forEach((card, i) => enList.appendChild(createTile(card, i * 0.02)));
        zhCards.forEach((card, i) => zhList.appendChild(createTile(card, i * 0.02)));
        requestAnimationFrame(() => requestAnimationFrame(syncTileUniformHeight));

        if (timerInt) clearInterval(timerInt);
        timerInt = setInterval(() => {
            timer++;
            document.getElementById("timer").textContent = timer;
        }, 1000);
        startDailyActivityAutoFlush();
        updateResetBtn();
    }

    function updateColCounts() {
        const enLeft = document.querySelectorAll("#enList .tile").length;
        const zhLeft = document.querySelectorAll("#zhList .tile").length;
        const enEl = document.getElementById("enColCount");
        const zhEl = document.getElementById("zhColCount");
        if (enEl) enEl.textContent = enLeft;
        if (zhEl) zhEl.textContent = zhLeft;
    }

    function removeMatchedTiles(el1, el2) {
        const tiles = [el1, el2];
        tiles.forEach(el => {
            el.classList.remove("selected", "tile-enter");
            el.classList.add("removing");
        });
        setTimeout(() => {
            tiles.forEach(el => {
                if (el.isConnected) el.remove();
            });
            updateColCounts();
            if (replayMode) {
                const left = document.querySelectorAll("#enList .tile, #zhList .tile").length;
                if (left === 0) {
                    stopDailyActivityAutoFlush();
                    if (currentSheet) recordSessionActivity(currentSheet);
                    replayMode = false;
                    if (timerInt) clearInterval(timerInt);
                    toast("本局练完啦！词库里的消除记录已保留");
                    updateResetBtn();
                }
                return;
            }
            const left = document.querySelectorAll("#enList .tile, #zhList .tile").length;
            if (left === 0 && currentSheet) {
                const sheet = currentSheet;
                stopDailyActivityAutoFlush();
                recordSessionActivity(sheet);
                refreshDateOption(sheet);
                updateMatchedStat();
                updateResetBtn();
                if (isDailyQuotaDone(sheet)) {
                    const n = getDailySlice(sheet).length;
                    celebrateFullComplete({
                        moves: moveCount,
                        timer: timer,
                        extraText: dayLabelForSheet(sheet) + "每日 " + n + " 个单词已全部消除 🎉"
                    });
                } else {
                    toast(dayLabelForSheet(sheet) + "当前批次已练完，点击「再玩一次」可重新练习");
                }
            }
        }, 400);
    }

    function applyCorrectMatch(first, second) {
        playGameSfx(() => Sfx.match());
        first.el.classList.remove("selected");
        second.el.classList.remove("selected");
        removeMatchedTiles(first.el, second.el);
        const matchedPair = curPairs[first.pairIdx];
        adjustWordRecord(matchedPair, 1);
        matchedCount++;
        applyEliminatedInMemory(currentSheet, matchedPair);
        updateMatchedStat();
        queueSave(() => persistEliminated(currentSheet, matchedPair));
        refreshDateOption(currentSheet);
        selectedTile = null;
        lockBoard = false;
    }

    function applyWrongMatch(first, second) {
        playGameSfx(() => Sfx.wrong());
        const wrongPair = getWrongMatchPair(first, second);
        if (wrongPair) {
            adjustWordRecord(wrongPair, -1);
            incrementPairErrorCount(wrongPair);
            applyPairProgressInMemory(currentSheet, wrongPair, false);
            queueSave(() => persistPairProgress(currentSheet, wrongPair, false));
        }
        const enPick = first.type === "en" ? first : second;
        const otherPick = first.type === "en" ? second : first;
        first.el.classList.add("shake");
        second.el.classList.add("shake");
        const limitHit = registerWrongMatch();
        setTimeout(() => {
            first.el.classList.remove("shake");
            second.el.classList.remove("shake");
            otherPick.el.classList.remove("selected");
            enPick.el.classList.add("selected");
            selectedTile = { el: enPick.el, pairIdx: enPick.pairIdx, type: "en" };
            if (!limitHit) lockBoard = false;
        }, 450);
    }

    function showEliminateConfirmModal(first, second, ok) {
        const enPick = first.type === "en" ? first : second;
        const zhPick = first.type === "zh" ? first : second;
        const en = enPick.el.textContent.trim();
        const zh = zhPick.el.textContent.trim();
        document.getElementById("eliminateConfirmTitle").textContent = ok ? "确认消除？" : "确认配对？";
        document.getElementById("eliminateConfirmText").textContent =
            (ok ? "确定要消除这一对吗？ " : "确认本次配对？ ") + en + " — " + zh;
        document.getElementById("eliminateConfirmBtn").textContent = ok ? "确认消除" : "确认配对";
        pendingMatchConfirm = { first, second, ok: !!ok };
        const modal = document.getElementById("eliminateConfirmModal");
        modal.classList.add("show");
        modal.setAttribute("aria-hidden", "false");
    }

    function hideEliminateConfirmModal() {
        const modal = document.getElementById("eliminateConfirmModal");
        modal.classList.remove("show");
        modal.setAttribute("aria-hidden", "true");
        pendingMatchConfirm = null;
    }

    function cancelEliminateConfirm() {
        if (!pendingMatchConfirm) {
            hideEliminateConfirmModal();
            return;
        }
        const { first, second } = pendingMatchConfirm;
        pairAwaitingConfirm = { first, second };
        const { en } = splitEnZhPicks(first, second);
        selectedTile = { el: en.el, pairIdx: en.pairIdx, type: "en" };
        lockBoard = false;
        hideEliminateConfirmModal();
    }

    function confirmEliminateMatch() {
        if (!pendingMatchConfirm) return;
        const { first, second, ok } = pendingMatchConfirm;
        pairAwaitingConfirm = null;
        hideEliminateConfirmModal();
        moveCount++;
        document.getElementById("moveCount").textContent = moveCount;
        if (ok) applyCorrectMatch(first, second);
        else applyWrongMatch(first, second);
    }

    function onTileClick(e) {
        const tile = e.currentTarget;
        if (lockBoard || tile.classList.contains("removing") || !tile.isConnected) return;
        if (document.getElementById("eliminateConfirmModal").classList.contains("show")) return;

        const pairIdx = Number(tile.dataset.pairIdx);
        const type = tile.dataset.type;

        if (normalizePairAwaitingOnClick(tile, pairIdx, type)) return;

        if (selectedTile && selectedTile.el === tile) {
            tile.classList.remove("selected");
            selectedTile = null;
            return;
        }

        if (type === "en" && Sfx.isEnabled()) EnglishSpeech.speak(tile);

        if (!selectedTile) {
            selectedTile = { el: tile, pairIdx, type };
            settleTileEnter(tile);
            tile.classList.add("selected");
            playGameSfx(() => Sfx.select());
            return;
        }

        if (selectedTile.type === type) {
            document.querySelectorAll('#gameBoard .tile[data-type="' + type + '"].selected').forEach(el => {
                if (el !== tile) el.classList.remove("selected");
            });
            const prev = selectedTile.el;
            selectedTile = { el: tile, pairIdx, type };
            settleTileEnter(tile);
            tile.classList.add("selected");
            if (prev !== tile) prev.classList.remove("selected");
            playGameSfx(() => Sfx.switchTile());
            return;
        }

        document.querySelectorAll('#gameBoard .tile[data-type="' + type + '"].selected').forEach(el => {
            el.classList.remove("selected");
        });
        const first = selectedTile;
        const second = { el: tile, pairIdx, type };
        settleTileEnter(tile);
        tile.classList.add("selected");
        lockBoard = true;
        pairAwaitingConfirm = null;

        const ok = first.pairIdx === second.pairIdx;

        if (gameConfig.eliminateConfirm) {
            showEliminateConfirmModal(first, second, ok);
            return;
        }

        moveCount++;
        document.getElementById("moveCount").textContent = moveCount;

        if (ok) {
            applyCorrectMatch(first, second);
        } else {
            applyWrongMatch(first, second);
        }
    }

    const SURPRISE_SCENES = [
        { id: "hero", label: "今日小英雄勋章！" },
        { id: "parade", label: "小伙伴来祝贺啦！" },
        { id: "balloons", label: "气球飞向天空！" },
        { id: "rainbow", label: "彩虹惊喜降临！" },
        { id: "stars", label: "星星为你闪耀！" },
        { id: "rocket", label: "火箭冲冲冲！" }
    ];
    const SCENE_FX = {
        hero: { duration: 5200, confetti: 72, rocketGap: 880 },
        parade: { duration: 5800, confetti: 128, rocketGap: 480 },
        balloons: { duration: 5000, confetti: 52, rocketGap: 1300 },
        rainbow: {
            duration: 5600,
            confetti: 108,
            rocketGap: 640,
            palette: ["#ff8fab", "#ffbc6e", "#ffe66d", "#7dcea0", "#7eb8ff", "#b28dff"]
        },
        stars: { duration: 6200, confetti: 88, rocketGap: 1050 },
        rocket: { duration: 7200, confetti: 58, rocketGap: 160 }
    };
    let lastSurpriseSceneId = null;
    let fxRocketGap = 400;
    const WIN_TITLES = [
        "🎊 全部消灭！你是配对小能手！",
        "🌟 太厉害了！今日任务完成！",
        "🏆 满分通关！超级棒！",
        "🎉 耶！今天的单词都搞定啦！"
    ];
    const FX_COLORS = ["#8eb8c9", "#a8c9a0", "#d4b896", "#9eb5d4", "#b5c9b0", "#c9d4de"];

    let fxAnimId = null;
    let fxEndAt = 0;
    let fxParticles = [];
    let fxRockets = [];
    let confettiPieces = [];
    let fxLastRocket = 0;
    let surpriseHideTimer = null;
    /** 仅在本局刚消完最后一对时为 true；切换日期时为 false */
    let celebrationAllowed = false;

    function resizeFxCanvas() {
        const c = document.getElementById("fxCanvas");
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        return c;
    }

    function stopCelebration() {
        celebrationAllowed = false;
        if (fxAnimId) cancelAnimationFrame(fxAnimId);
        fxAnimId = null;
        fxEndAt = 0;
        fxParticles = [];
        fxRockets = [];
        confettiPieces = [];
        if (surpriseHideTimer) {
            clearTimeout(surpriseHideTimer);
            surpriseHideTimer = null;
        }
        const c = document.getElementById("fxCanvas");
        if (c && c.getContext) c.getContext("2d").clearRect(0, 0, c.width, c.height);
        const layer = document.getElementById("celebrationLayer");
        if (layer) layer.classList.add("off");
        const scene = document.getElementById("surpriseScene");
        if (scene) {
            scene.innerHTML = "";
            scene.className = "surprise-scene";
        }
    }

    function showWinMessage(opts, quiet) {
        const over = document.getElementById("gameOverMsg");
        let text;
        if (quiet) {
            text = opts.extraText || dayLabelForSheet(currentSheet) + "单词已全部消除 🎉";
        } else {
            const title = WIN_TITLES[Math.floor(Math.random() * WIN_TITLES.length)];
            text = title;
            if (opts.moves != null) text += " 步数 " + opts.moves + " · 用时 " + opts.timer + " 秒";
            if (opts.extraText) text += (opts.moves != null ? " · " : " ") + opts.extraText;
        }
        over.className = quiet ? "show-done-quiet" : "show-win";
        over.style.display = "block";
        over.textContent = text;
    }

    function fxBurst(x, y, color) {
        const n = 36 + Math.floor(Math.random() * 24);
        for (let i = 0; i < n; i++) {
            const a = (Math.PI * 2 * i) / n + Math.random() * 0.4;
            const sp = 2 + Math.random() * 5;
            fxParticles.push({
                x, y,
                vx: Math.cos(a) * sp,
                vy: Math.sin(a) * sp,
                life: 1,
                decay: 0.01 + Math.random() * 0.012,
                color,
                size: 2 + Math.random() * 3,
                gravity: 0.05
            });
        }
    }

    function pickSurpriseScene() {
        const pool = lastSurpriseSceneId
            ? SURPRISE_SCENES.filter(s => s.id !== lastSurpriseSceneId)
            : SURPRISE_SCENES;
        const list = pool.length ? pool : SURPRISE_SCENES;
        const scene = list[Math.floor(Math.random() * list.length)];
        lastSurpriseSceneId = scene.id;
        return scene;
    }

    function launchCelebrationFx(durationMs, sceneId) {
        if (!celebrationAllowed) return;
        const fxOpts = SCENE_FX[sceneId] || {};
        const palette = fxOpts.palette || FX_COLORS;
        const confettiN = fxOpts.confetti != null ? fxOpts.confetti : 90;
        fxRocketGap = fxOpts.rocketGap != null ? fxOpts.rocketGap : 400;
        const canvas = resizeFxCanvas();
        const ctx = canvas.getContext("2d");
        fxEndAt = Date.now() + durationMs;
        fxLastRocket = 0;
        confettiPieces = Array.from({ length: confettiN }, () => ({
            x: Math.random() * canvas.width,
            y: -20 - Math.random() * canvas.height,
            r: 4 + Math.random() * 7,
            vx: (Math.random() - 0.5) * 3,
            vy: 2 + Math.random() * 4,
            rot: Math.random() * 360,
            vr: (Math.random() - 0.5) * 10,
            color: palette[Math.floor(Math.random() * palette.length)]
        }));

        function loop() {
            if (!celebrationAllowed || Date.now() > fxEndAt) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                fxAnimId = null;
                confettiPieces = [];
                fxParticles = [];
                fxRockets = [];
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (Date.now() - fxLastRocket > fxRocketGap * (0.55 + Math.random() * 0.65)) {
                fxLastRocket = Date.now();
                fxRockets.push({
                    x: canvas.width * (0.12 + Math.random() * 0.76),
                    y: canvas.height,
                    ty: canvas.height * (0.12 + Math.random() * 0.38),
                    vy: -9 - Math.random() * 4,
                    color: palette[Math.floor(Math.random() * palette.length)]
                });
            }

            fxRockets = fxRockets.filter(r => {
                r.y += r.vy;
                r.vy += 0.2;
                ctx.beginPath();
                ctx.arc(r.x, r.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = r.color;
                ctx.fill();
                if (r.vy >= -1 || r.y <= r.ty) {
                    fxBurst(r.x, r.y, r.color);
                    fxBurst(r.x + (Math.random() - 0.5) * 40, r.y, FX_COLORS[Math.floor(Math.random() * FX_COLORS.length)]);
                    return false;
                }
                return true;
            });

            fxParticles = fxParticles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.life -= p.decay;
                if (p.life <= 0) return false;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                return true;
            });

            confettiPieces.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.vr;
                if (p.y > canvas.height + 20) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }
                ctx.save();
                ctx.globalAlpha = 0.88;
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rot * Math.PI) / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
                ctx.restore();
            });

            fxAnimId = requestAnimationFrame(loop);
        }
        if (fxAnimId) cancelAnimationFrame(fxAnimId);
        loop();
    }

    function playSurpriseScene(scene) {
        if (!celebrationAllowed) return;
        const box = document.getElementById("surpriseScene");
        box.innerHTML = "";
        box.className = "surprise-scene active";
        const cheers = ["太棒啦！", "你真厉害！", "继续加油！", "小小学霸！"];

        if (scene.id === "hero") {
            box.innerHTML =
                '<div class="surprise-hero"><div class="badge">🏅</div><h2>' + scene.label + '</h2>' +
                '<p>' + cheers[Math.floor(Math.random() * cheers.length)] + '</p></div>' +
                '<div class="scene-label">✨ ' + scene.label + '</div>';
        } else if (scene.id === "parade") {
            ["🎉", "🌟", "🎈", "🦸", "👏", "🎊", "💫", "🥳"].forEach((e, i) => {
                const span = document.createElement("span");
                span.className = "emoji-parade";
                span.textContent = e;
                span.style.top = (12 + i * 9) + "%";
                span.style.animationDelay = (i * 0.3) + "s";
                span.style.animationDuration = (3.2 + i * 0.15) + "s";
                box.appendChild(span);
            });
            const lbl = document.createElement("div");
            lbl.className = "scene-label";
            lbl.textContent = "🎪 " + scene.label;
            box.appendChild(lbl);
        } else if (scene.id === "balloons") {
            const colors = ["#ff8a80", "#ffd180", "#80cbc4", "#ce93d8", "#90caf9", "#a5d6a7"];
            for (let i = 0; i < 16; i++) {
                const b = document.createElement("div");
                b.className = "balloon";
                b.style.left = (4 + Math.random() * 92) + "%";
                b.style.background = colors[i % colors.length];
                b.style.animationDelay = (Math.random() * 1.5) + "s";
                b.style.setProperty("--drift", ((Math.random() - 0.5) * 100) + "px");
                box.appendChild(b);
            }
            const lbl = document.createElement("div");
            lbl.className = "scene-label";
            lbl.style.position = "absolute";
            lbl.style.bottom = "18%";
            lbl.textContent = "🎈 " + scene.label;
            box.appendChild(lbl);
        } else if (scene.id === "rainbow") {
            box.innerHTML =
                '<div class="rainbow-arc"></div><div class="scene-label">🌈 ' + scene.label + '</div>';
            ensureRainbowIcon(box.querySelector(".rainbow-arc"));
        } else if (scene.id === "stars") {
            for (let i = 0; i < 24; i++) {
                const s = document.createElement("span");
                s.className = "sky-star";
                s.textContent = ["⭐", "✨", "💫"][i % 3];
                s.style.left = (Math.random() * 100) + "%";
                s.style.top = (Math.random() * 100) + "%";
                s.style.animationDelay = (Math.random() * 2) + "s";
                s.style.fontSize = (0.9 + Math.random() * 1.8) + "rem";
                box.appendChild(s);
            }
            const lbl = document.createElement("div");
            lbl.className = "scene-label";
            lbl.textContent = "✨ " + scene.label;
            box.appendChild(lbl);
        } else if (scene.id === "rocket") {
            box.innerHTML =
                '<div class="rocket-msg">🚀</div>' +
                '<h2 style="margin:10px 0 4px;font-size:clamp(1.3rem,5vw,1.8rem);color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.2)">' + scene.label + '</h2>' +
                '<div class="scene-label">🚀 ' + cheers[Math.floor(Math.random() * cheers.length)] + '</div>';
        }

        if (surpriseHideTimer) clearTimeout(surpriseHideTimer);
        const hideMs = (SCENE_FX[scene.id] && SCENE_FX[scene.id].duration) || 5200;
        surpriseHideTimer = setTimeout(() => {
            surpriseHideTimer = null;
            box.classList.remove("active");
            box.innerHTML = "";
        }, hideMs);
    }

    /** 手动切换日期且该日已全部消除：只显示文案，不播烟花/音效/惊喜场景 */
    function showAllDoneQuiet(opts) {
        opts = opts || {};
        stopCelebration();
        stopDailyActivityAutoFlush();
        if (currentSheet) flushDailyActivityDelta(currentSheet, { silent: true });
        if (timerInt) clearInterval(timerInt);
        const scene = document.getElementById("surpriseScene");
        if (scene) {
            scene.classList.remove("active");
            scene.innerHTML = "";
        }
        showWinMessage(opts, true);
        updateResetBtn();
    }

    /** 本局刚完成最后一对时：文案 + 烟花 + 音效 */
    function celebrateFullComplete(opts) {
        opts = opts || {};
        stopCelebration();
        celebrationAllowed = true;
        const layer = document.getElementById("celebrationLayer");
        if (layer) layer.classList.remove("off");
        if (timerInt) clearInterval(timerInt);
        const scene = pickSurpriseScene();
        const fxOpts = SCENE_FX[scene.id] || {};
        const duration = fxOpts.duration || 5500;
        if (!opts.extraText) {
            opts.extraText = "✨ " + scene.label;
        }
        showWinMessage(opts, false);
        updateResetBtn();
        Sfx.win();
        launchCelebrationFx(duration, scene.id);
        playSurpriseScene(scene);
    }

    function initBubbles() {
        const box = document.getElementById("bubbles");
        const stars = ["✨", "⭐", "💫"];
        for (let i = 0; i < 12; i++) {
            const b = document.createElement("div");
            b.className = "bubble";
            const size = 16 + Math.random() * 40;
            b.style.width = b.style.height = size + "px";
            b.style.left = Math.random() * 100 + "%";
            b.style.animationDuration = 10 + Math.random() * 14 + "s";
            b.style.animationDelay = Math.random() * 10 + "s";
            box.appendChild(b);
        }
        for (let i = 0; i < 10; i++) {
            const s = document.createElement("span");
            s.className = "sky-star";
            s.textContent = stars[i % 3];
            s.style.left = Math.random() * 100 + "%";
            s.style.top = Math.random() * 100 + "%";
            s.style.animationDelay = Math.random() * 3 + "s";
            s.style.fontSize = (0.7 + Math.random() * 0.8) + "rem";
            box.appendChild(s);
        }
    }

    document.getElementById("dateSelector").addEventListener("change", function () {
        const val = this.value;
        if (!val) {
            if (currentSheet) flushDailyActivityDelta(currentSheet, { silent: true });
            stopDailyActivityAutoFlush();
            currentSheet = "";
            stopCelebration();
            document.getElementById("gameBoard").innerHTML = "";
            document.getElementById("gameOverMsg").style.display = "none";
            return;
        }
        applySheetSelection(val, true);
    });

    document.getElementById("reviewBtn").addEventListener("click", showReviewModal);
    document.getElementById("reviewCloseBtn").addEventListener("click", hideReviewModal);
    document.getElementById("reviewModal").addEventListener("click", (e) => {
        if (e.target.id === "reviewModal") hideReviewModal();
    });
    (function () {
        const reviewModal = document.getElementById("reviewModal");
        const reviewList = document.getElementById("reviewList");
        reviewModal.addEventListener(
            "wheel",
            (e) => {
                if (!reviewModal.classList.contains("show")) return;
                if (reviewList.contains(e.target)) return;
                e.preventDefault();
            },
            { passive: false }
        );
        reviewModal.addEventListener(
            "touchmove",
            (e) => {
                if (!reviewModal.classList.contains("show")) return;
                if (reviewList.contains(e.target)) return;
                e.preventDefault();
            },
            { passive: false }
        );
        reviewList.addEventListener(
            "wheel",
            (e) => {
                if (!reviewModal.classList.contains("show")) return;
                const atTop = reviewList.scrollTop <= 0;
                const atBottom =
                    reviewList.scrollTop + reviewList.clientHeight >= reviewList.scrollHeight - 1;
                if ((atTop && e.deltaY < 0) || (atBottom && e.deltaY > 0)) e.preventDefault();
            },
            { passive: false }
        );
    })();
    document.getElementById("resetBtn").addEventListener("click", showResetConfirmModal);
    document.getElementById("resetCancelBtn").addEventListener("click", hideResetConfirmModal);
    document.getElementById("resetConfirmBtn").addEventListener("click", confirmResetAndReplay);
    document.getElementById("resetModal").addEventListener("click", (e) => {
        if (e.target.id === "resetModal") hideResetConfirmModal();
    });
    document.getElementById("eliminateCancelBtn").addEventListener("click", cancelEliminateConfirm);
    document.getElementById("eliminateConfirmBtn").addEventListener("click", confirmEliminateMatch);
    document.getElementById("eliminateConfirmModal").addEventListener("click", (e) => {
        if (e.target.id === "eliminateConfirmModal") cancelEliminateConfirm();
    });
    document.getElementById("retryBtn").addEventListener("click", tryAutoLoad);
    document.getElementById("pickWordsBtn").addEventListener("click", () => {
        document.getElementById("pickWordsInput").click();
    });
    document.getElementById("pickWordsInput").addEventListener("change", function () {
        if (this.files[0]) loadWordsFromFile(this.files[0]);
        this.value = "";
    });

    document.getElementById("soundToggleBtn").addEventListener("click", () => {
        Sfx.unlock();
        Sfx.setEnabled(!Sfx.isEnabled());
        if (Sfx.isEnabled()) Sfx.tap();
    });
    updateSoundToggleUi();
    document.body.addEventListener("pointerdown", () => Sfx.unlock(), { once: true, passive: true });

    setHeroTitle("英文中文对对碰");
    applyGradeUi();
    initBubbles();
    window.addEventListener("resize", () => resizeFxCanvas());

    window.addEventListener("load", () => tryAutoLoad());
    window.addEventListener("pagehide", () => {
        if (currentSheet) flushDailyActivityDelta(currentSheet, { silent: true });
        stopDailyActivityAutoFlush();
    });
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden" && currentSheet) {
            flushDailyActivityDelta(currentSheet, { silent: true });
        }
    });
    </script>
