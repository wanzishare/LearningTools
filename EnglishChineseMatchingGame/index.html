<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语中文对对碰 · 入口</title>
    <style>
        body {
            font-family: "Nunito", "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #b8e6ff, #e8d4ff 50%, #ffe8d4 100%);
        }
        .box {
            background: #fffef9ef;
            border: 4px solid #e5d2fd;
            border-radius: 32px;
            padding: 48px 36px 40px 36px;
            min-width: 360px;
            min-height: 420px;
            text-align: center;
            box-shadow: 0 20px 60px 0 rgba(140, 100, 200, 0.17);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            position: relative;
        }
        .logo {
            font-size: 2.5rem;
            margin-bottom: 6px;
            user-select: none;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #6b4a9a;
            font-size: 2.1rem;
            letter-spacing: 1px;
            font-family: "Nunito", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-weight: 800;
        }
        .desc {
            color: #6b5b8a;
            margin: 0 0 8px 0;
            font-size: 1.08rem;
            line-height: 1.7;
            font-family: inherit;
            font-weight: 600;
        }
        .user-list {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 12px 0 0 0;
            flex-wrap: wrap;
        }
        .user-list a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 95px;
            min-height: 50px;
            margin: 6px 8px;
            padding: 17px 26px 13px 26px;
            border-radius: 20px;
            font-weight: 800;
            text-decoration: none;
            color: #fff;
            font-size: 1.12rem;
            box-shadow: 0 6px 18px 0 rgba(105, 90, 140, 0.09);
            transition: transform 0.14s, box-shadow 0.15s;
            border: none;
            font-family: inherit;
            position: relative;
        }
        .user-list a:hover {
            transform: translateY(-2px) scale(1.045);
            box-shadow: 0 10px 32px 0 rgba(126, 180, 255, 0.15), 0 2px 10px 0 rgba(240,210,255,0.09);
        }
        .user-list .icon {
            font-size: 1.4em;
            margin-bottom: 3px;
        }
        .parent {
            background: linear-gradient(135deg, #958dff 5%, #7eb8ff 85%);
            margin-top: 10px;
            color: #fff;
            font-size: 1.07rem;
            font-weight: 800;
            padding: 13px 18px 13px 20px;
            border-radius: 17px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 180px;
            margin-bottom: 0;
            box-shadow: 0 2px 18px 0 #b8e3ffaf;
            text-decoration: none;
            font-family: inherit;
        }
        .parent .icon-p {
            font-size: 1.2em;
            margin-right: 3px;
        }
        .footnote {
            color: #9e88be;
            font-size: 0.92rem;
            margin-top: 18px;
            font-weight: 600;
            letter-spacing: .2px;
            opacity: 0.97;
            text-align: center;
        }
        @media (max-width: 520px) {
            .box {
                padding: 21px 7vw 30px 7vw;
                border-radius: 20px;
                min-width: 0;
            }
            h1 { font-size: 1.33rem;}
            .desc, .footnote { font-size: 0.99rem;}
            .user-list a { font-size: 1rem; min-width: 72px; padding: 12px 11vw;}
            .parent { min-width: 130px; font-size: 0.97rem;}
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo" aria-hidden="true">🎉🌈</div>
        <h1>英语中文对对碰</h1>
        <div class="desc">
            轻松有趣地学习单词，提高词汇量。<br>
            请选择你的角色开始挑战👇
        </div>
        <div class="user-list" id="userList"></div>
        <a class="parent" href="parent-monitor.html">
            <span class="icon-p" aria-hidden="true">📊</span>
            家长查看进度
        </a>
        <div class="footnote">
            <span>📢 小朋友：每天坚持打卡，看看自己能不能全对！<br>
            👨‍👩‍👧‍👦 家长可以随时查进度，帮助孩子进步。</span>
        </div>
    </div>
    <script src="students.js"></script>
    <script>
        (function () {
            var list = document.getElementById("userList");
            var students = (window.StudentRoster && StudentRoster.list()) || [];
            if (!students.length) {
                list.innerHTML = '<p style="color:#a00;font-weight:700">请先在 students.js 中配置学生</p>';
                return;
            }
            students.forEach(function (st) {
                var a = document.createElement("a");
                a.href = "EnglishChineseMatchingGame.html?grade=" + encodeURIComponent(st.key);
                a.style.background = "linear-gradient(132deg, " + st.color + " 1%, " + st.color + " 90%)";
                a.innerHTML =
                    '<span class="icon" aria-hidden="true">' + (st.icon || "🙂") + "</span>" +
                    st.label;
                list.appendChild(a);
            });
        })();
    </script>
</body>
</html>
